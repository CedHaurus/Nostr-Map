<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nostr Map est temporairement en maintenance. L'annuaire revient bientôt." />
  <title>Nostr Map — Maintenance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d14;
      --surface:  #13131a;
      --border:   rgba(255,255,255,.07);
      --text:     #e2e8f0;
      --muted:    #64748b;
      --primary:  #8b5cf6;
      --accent:   #06b6d4;
      --gradient: linear-gradient(135deg, #8b5cf6, #06b6d4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Fond animé */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(139,92,246,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3.5rem 3rem;
      max-width: 480px;
      width: calc(100% - 2rem);
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: 1.15rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(139,92,246,.12);
      border: 1px solid rgba(139,92,246,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,.3); }
      50%       { box-shadow: 0 0 0 12px rgba(139,92,246,0); }
    }

    .icon-wrap svg {
      color: var(--primary);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: .6rem;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

.tagline {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Nostr Map ✦</div>

    <div class="icon-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <p class="tagline">Annuaire des utilisateurs Nostr francophones</p>

    <h1>Maintenance en cours</h1>
    <p class="subtitle">
      L'annuaire est temporairement indisponible.<br>
      Nous revenons très vite.
    </p>
  </div>
</body>
</html>
