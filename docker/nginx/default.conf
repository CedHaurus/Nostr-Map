server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;
    charset utf-8;

    error_page 404 /404.html;
    location = /404.html { internal; }

    # ── Maintenance mode ─────────────────────────────────────────────────────────
    # Si /var/www/html/storage/.maintenance existe → rediriger vers maintenance.html
    # Exceptions : /admin/*, /maintenance.html, les fichiers cachés (.)
    set $maint "";
    if (-f /var/www/html/storage/.maintenance) {
        set $maint "1";
    }
    if ($uri ~ "^/(admin|maintenance\.html)") {
        set $maint "";
    }
    if ($maint = "1") {
        rewrite ^(.*)$ /maintenance.html break;
    }

    # Bloquer l'accès au dossier storage
    location ^~ /storage/ { return 404; }

    # Si maintenance désactivée et user encore sur /maintenance.html → renvoyer accueil
    location = /maintenance.html {
        set $back 1;
        if (-f /var/www/html/storage/.maintenance) { set $back 0; }
        if ($back = 1) { return 302 /; }
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # Hide server info
    fastcgi_hide_header X-Powered-By;
    proxy_hide_header X-Powered-By;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    # CSS/JS : pas de cache agressif, revalidation par ETag
    location ~* \.(css|js)$ {
        expires off;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # ── Canonical URLs : .html → sans extension ─────────────────────────────
    # Utilise https:// explicitement : derrière Caddy, $scheme vaut "http"
    # et une redirection relative génèrerait Location: http://…
    location = /faq.html             { return 301 https://$http_host/faq; }
    location = /connexion.html       { return 301 https://$http_host/connexion; }
    location = /soumettre.html       { return 301 https://$http_host/soumettre; }
    location = /mentions-legales.html{ return 301 https://$http_host/mentions-legales; }
    location = /mon-profil.html      { return 301 https://$http_host/mon-profil; }
    location = /contact.html         { return 301 https://$http_host/contact; }

    # ── Sitemap dynamique ────────────────────────────────────────────────────
    location = /sitemap.xml {
        fastcgi_pass php:9000;
        fastcgi_read_timeout 30;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/sitemap.php;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # /p/[slug] → p.php (injecte les OG tags côté serveur pour les bots)
    location ~ ^/p/([a-z0-9_-]+)$ {
        fastcgi_pass php:9000;
        fastcgi_read_timeout 30;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/p.php;
        fastcgi_param QUERY_STRING    slug=$1;
    }

    # ── Admin panel ──────────────────────────────────────────────────────────
    # Bloquer les helpers internes (_*.php) — priorité sur les règles suivantes
    location ~ ^/admin/_[^/]+\.php$ {
        return 404;
    }

    # PHP admin — pas de cache, no-index
    location ~ ^/admin/[^/]+\.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 30;
        add_header Cache-Control "no-store, no-cache" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        include fastcgi_params;
    }

    # /admin et /admin/ → index.php (login)
    location = /admin  { return 301 /admin/; }
    location = /admin/ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/admin/index.php;
        fastcgi_read_timeout 30;
        add_header Cache-Control "no-store, no-cache" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        include fastcgi_params;
    }

    # Fichiers statiques admin (CSS, JS, assets)
    location /admin/ {
        try_files $uri =404;
    }

    # ── API PHP ──────────────────────────────────────────────────────────────
    location ~ ^/api/[^/]+\.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 30;
        include fastcgi_params;
    }

    # og-image.php — génération d'images OG dynamiques
    location = /og-image.php {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/og-image.php;
        fastcgi_read_timeout 10;
        add_header Cache-Control "public, max-age=3600" always;
        include fastcgi_params;
    }

    # Bloquer l'accès direct aux polices (usage interne PHP uniquement)
    location ~ ^/assets/fonts/ {
        return 404;
    }

    # Bloquer tout autre .php
    location ~ \.php$ {
        return 404;
    }

    # SPA fallback pour les pages HTML
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Logs
    access_log /var/log/nginx/nostrmap_access.log;
    error_log  /var/log/nginx/nostrmap_error.log;
}
